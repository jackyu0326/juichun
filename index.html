<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Juichun AI Assistant</title>
    
    <script defer src="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.15/chat-messenger.js"></script>
    <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.15/themes/chat-messenger-default.css">
    <link rel="stylesheet" href="https://www.gstatic.com/ces-console/fast/chat-messenger/prod/v1.15/themes/chat-messenger-layout.css">

    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f7f6; }
        #login-container { text-align: center; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { padding: 10px; width: 80%; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { padding: 10px 20px; background-color: #4285f4; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        #chat-interface { display: none; width: 100%; height: 100vh; position: relative; }
        /* 讓對話元件撐滿螢幕 */
        chat-messenger { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>課程 AI 助教</h2>
        <input type="text" id="student-info" placeholder="請輸入學號與姓名">
        <button onclick="startChat()">開始互動</button>
    </div>

    <div id="chat-interface">
        <chat-messenger 
            id="myMessenger"
            url-allowlist="*"
            allow-fullscreen="true">
            <chat-messenger-container 
                chat-title="Professor Juichun" 
                enable-file-upload="true">
                <chat-reset-session-button slot="titlebar-actions" title-text="重置對話"></chat-reset-session-button>
            </chat-messenger-container>
        </chat-messenger>
    </div>

    <script>
        let studentInfo = "";
        let isRegistered = false;

        function startChat() {
            const info = document.getElementById('student-info').value.trim();
            if (!info) return alert("請輸入資訊！");
            
            studentInfo = info;
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('chat-interface').style.display = 'block';

            // 確保 SDK 已加載且尚未註冊過
            if (window.chatSdk && !isRegistered) {
                const messengerElement = document.getElementById('myMessenger');
                
                const context = chatSdk.prebuilts.ces.createContext({
                    // 從你的專案路徑擷取的 Deployment Name
                    deploymentName: "projects/512548635446/locations/us/apps/b67c60af-51cd-43d7-8b5e-767d0665597f/deployments/802e7f50-ddcf-4f92-bfd4-569611c6840b",
                    tokenBroker: {
                        enableTokenBroker: true,
                        accessToken: "ya29.c.c0AZ4bNpa4SrVw0IiBMP4aeHTjppukLekqLQ9xTZpsEeZawrXXwjG8XwnVzkFTlu86mxXnfPRYH3wNb_7J-kP4S28Ox1UIkFl4ZLAt6bZu6NX9RS1nTeXNxBAIl70Hl_8Jqzq_sh6Frr5DPGq3MfuEfsNqMUNswkQC_3-5emDFDQgb1-s5mDViLSd1xlsjnroqoZysacVNwgj7MThEFe61QWA_BYtLBz-Z0ubk7SeA0uEiOK_jyDp13KNLwKs19G5x0gw7ZcJ5XxrG4wL51WEAq2TVEKeVy0dv8pb-L739HWGKUN_CPrcoGbwA8By1EvjTqaH-R_FFc8Dm5qtZKgpLCAO0PAOp7PmTGSJ6X5HFlKlS08I04Mz2VMEBj67xIiaYz54kCgH399Dkea1y-ij8udSvdg2zaXtfs258ZWBXlsxwFBz_StFZtQZf6ckfcaqJQWfSFzFrl84F0Vt_RxVoIbucQ2tXvRQ15giu1Xjxwks12OxmV-k2Ic7sIfSuZWRk0Z9ekX9y5Oqe_k4Q5XpQcSM3MFi7i4l8rF2IpRi-Fy98UO3B4OnyIQ9m8meepV1beFg9Xpezrm1QccIOz2F4ZVu5xZSjY8l-jmdIalV_Uc1Y6OxBqXjj3miVOod05bym2Im3SgS-0g_VBOanM44092VqQbU6gYXUfaadx0_s4Xat4r8gM1RlgzqJ_6m8URY3lfUuuXV_taI8S80s5R09dyxkqag5Wn9QrBkf1YB9iz8bzjgeOexewfOW9wjMY2Z5ryUwoSvcd-4kBQ3ixwb9htO8M9yiV2m1puy0Ow2Oyq-W-F3UVI5kj-r7Of10V_Y4oU_Wf1W65FoQvgd237tIlUsaYhnB8SjRbi5R28gz7oae4QW2FcFcs2r78R0o5YjIV02U0IMjsaSw3O7uxFr7wp5Z3Ul4tbJ7Jk8gqq5f8iaa285jfeaZ_94qx4RcvrfIX2pmj_kfIJ5f7QdvhcOa454YemXhjFdtS8IzjOfugp-_I2gRlZzZf-I" // 注意：此 Token 通常只有 1 小時效期
                    }
                });

                // 將 Context 註冊到特定的 DOM 元素
                chatSdk.registerContext(context, messengerElement);
                isRegistered = true;
                console.log("Agent Context Bound to Element");

                // 等待元件初始化後發送首條訊息
                setTimeout(() => {
                    // 使用 setAttributeintent 是啟動 Playbook 最有效的方式
                    messengerElement.setAttribute('intent', `我是 ${studentInfo}，我準備好開始互動了。`);
                }, 2000);
            }
        }
    </script>
</body>
</html>
